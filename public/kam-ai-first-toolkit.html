Secteur : [SECTEUR]
CA actuel : [MONTANT]
Ancienneté relation : [DURÉE]

Fournis :
1. Forces de la relation actuelle
2. Faiblesses identifiées
3. Opportunités de croissance
4. Menaces (concurrence, budget, réorg)
5. Score de santé du compte (1-10)
6. 3 actions prioritaires pour les 30 prochains jours`,tags:["SWOT","analyse","stratégie"],difficulty:"starter",gordonBoost:!0},{id:"aa-002",category:"account-analysis",title:"Identifier le potentiel inexploité",description:"Découvrez les opportunités d'expansion cachées dans vos comptes existants.",prompt:`Tu es un expert KAM spécialisé dans l'expansion de comptes.

Compte : [NOM]
Produits/services actuellement vendus : [LISTE]
Départements touchés : [LISTE]
CA actuel : [MONTANT]

Analyse :
1. Quels départements n'utilisent pas encore nos solutions ?
2. Quels produits/services complémentaires pourraient être proposés ?
3. Y a-t-il des filiales ou entités non adressées ?
4. Estime le potentiel de croissance en % et en valeur
5. Propose une stratégie de pénétration en 3 étapes`,tags:["expansion","upsell","cross-sell"],difficulty:"intermediate",gordonBoost:!0},{id:"aa-003",category:"account-analysis",title:"Analyse concurrentielle sur le compte",description:"Évaluez la position de vos concurrents chez votre client.",prompt:`Tu es un stratège KAM. Analyse la position concurrentielle sur ce compte.

Compte : [NOM]
Concurrents identifiés chez le client : [LISTE]
Notre part de marché estimée : [%]

Fournis :
1. Matrice de comparaison (nous vs chaque concurrent) sur 5 critères
2. Points de vulnérabilité de chaque concurrent
3. Notre avantage compétitif différenciant
4. Risque de déplacement (1-10)
5. Stratégie défensive recommandée
6. Stratégie offensive pour gagner des parts`,tags:["concurrence","défensif","offensif"],difficulty:"advanced",gordonBoost:!1},{id:"aa-004",category:"account-analysis",title:"Comprendre l'organigramme décisionnel",description:"Décryptez la structure de décision de votre compte.",prompt:`Tu es un expert en vente complexe B2B. Aide-moi à comprendre la structure décisionnelle de ce compte.

Compte : [NOM]
Secteur : [SECTEUR]
Taille : [EFFECTIF]
Type d'achat : [NOUVEAU / RENOUVELLEMENT / EXTENSION]

Décris :
1. Les rôles typiques impliqués dans ce type de décision
2. Le processus de décision probable (étapes, timeline)
3. Les critères de décision par rôle (technique, financier, stratégique)
4. Comment identifier le vrai décideur vs le signataire
5. Questions à poser pour cartographier le circuit de décision`,tags:["décision","organigramme","vente complexe"],difficulty:"intermediate",gordonBoost:!0},{id:"aa-005",category:"account-analysis",title:"Audit de la relation client",description:"Évaluez la qualité et la profondeur de votre relation.",prompt:`Tu es un consultant KAM senior. Aide-moi à auditer la qualité de ma relation avec ce compte.

Compte : [NOM]
Fréquence de contact : [HEBDO/MENSUEL/TRIMESTRIEL]
Nombre de contacts actifs : [N]
Niveaux hiérarchiques touchés : [OPÉRATIONNEL/MANAGEMENT/DIRECTION]

Évalue :
1. Score de profondeur relationnelle (1-10) avec justification
2. Gaps identifiés (niveaux non couverts, départements absents)
3. Risque de dépendance à un seul contact
4. Plan d'action pour élargir et approfondir la relation
5. Fréquence de contact recommandée par niveau`,tags:["relation","audit","contacts"],difficulty:"starter",gordonBoost:!1},{id:"aa-006",category:"account-analysis",title:"Analyse des enjeux business du client",description:"Comprenez les priorités stratégiques de votre client pour mieux vous positionner.",prompt:`Tu es un analyste business B2B. Aide-moi à comprendre les enjeux stratégiques de mon client.

Client : [NOM]
Secteur : [SECTEUR]
Dernières actualités connues : [RÉSUMÉ]

Analyse :
1. Les 3 priorités stratégiques probables de ce client
2. Les pressions externes (réglementation, concurrence, marché)
3. Les défis internes probables (transformation, réduction de coûts, croissance)
4. Comment notre solution s'aligne avec ces enjeux
5. Comment reformuler notre proposition de valeur en langage client`,tags:["stratégie","business","valeur"],difficulty:"intermediate",gordonBoost:!0},{id:"aa-007",category:"account-analysis",title:"Analyse du risque de churn",description:"Identifiez les signaux d'alerte avant de perdre un compte.",prompt:`Tu es un expert en rétention de comptes stratégiques. Aide-moi à évaluer le risque de churn.

Compte : [NOM]
CA annuel : [MONTANT]
Date de renouvellement : [DATE]
Signaux observés : [LISTE : ex. moins de réunions, demandes de benchmark, changement de sponsor...]

Fournis :
1. Score de risque churn (1-10) avec justification
2. Classification des signaux (rouge / orange / vert)
3. Causes profondes probables
4. Plan de rétention d'urgence (actions J+7, J+30, J+60)
5. Argumentaire de valeur à préparer pour la prochaine réunion`,tags:["churn","rétention","risque"],difficulty:"advanced",gordonBoost:!0},{id:"aa-008",category:"account-analysis",title:"Préparer un executive summary du compte",description:"Créez un résumé exécutif pour votre direction ou pour le client.",prompt:`Tu es un KAM senior qui doit présenter un compte à sa direction. Génère un executive summary.

Compte : [NOM]
CA : [MONTANT]
Produits : [LISTE]
Historique : [RÉSUMÉ EN 2-3 LIGNES]

Structure le résumé en :
1. Vue d'ensemble (2 phrases max)
2. Métriques clés (CA, marge, satisfaction, ancienneté)
3. Faits marquants du dernier trimestre
4. Risques et opportunités
5. Recommandation stratégique
6. Prochaines étapes

Ton : professionnel, concis, orienté décision.`,tags:["executive","résumé","direction"],difficulty:"starter",gordonBoost:!1},{id:"aa-009",category:"account-analysis",title:"Cartographier la chaîne de valeur du client",description:"Comprenez comment votre client crée de la valeur pour mieux vous positionner.",prompt:`Tu es un consultant en stratégie B2B. Aide-moi à cartographier la chaîne de valeur de mon client.

Client : [NOM]
Secteur : [SECTEUR]
Activité principale : [DESCRIPTION]

Décris :
1. Les étapes clés de la chaîne de valeur du client
2. Où nous intervenons actuellement
3. Où nous pourrions intervenir (zones non adressées)
4. L'impact de notre solution sur la chaîne de valeur
5. Comment quantifier cet impact en termes business (ROI, TCO, productivité)`,tags:["chaîne de valeur","positionnement","ROI"],difficulty:"advanced",gordonBoost:!1},{id:"qbr-001",category:"qbr",title:"Structure complète de QBR",description:"Générez un plan de QBR professionnel en quelques minutes.",prompt:`Tu es un expert en revues stratégiques de comptes. Aide-moi à structurer ma prochaine QBR.

Compte : [NOM]
Participants côté client : [NOMS ET RÔLES]
Objectif principal : [RÉTENTION / EXPANSION / REDRESSEMENT]

Génère un plan de QBR complet :
1. Slide d'ouverture (agenda + objectifs)
2. Bilan du trimestre (résultats vs objectifs)
3. Valeur délivrée (métriques d'impact)
4. Incidents et résolutions
5. Vision stratégique (prochains 90 jours)
6. Opportunités identifiées
7. Plan d'action conjoint
8. Prochaines étapes

Pour chaque section, donne le contenu clé et les points de discussion.`,tags:["QBR","structure","trimestre"],difficulty:"starter",gordonBoost:!0},{id:"qbr-002",category:"qbr",title:"Préparer les questions difficiles de QBR",description:"Anticipez les questions que votre client va poser et préparez vos réponses.",prompt:`Tu es un coach de KAMs expérimenté. Mon client va me poser des questions difficiles lors de ma prochaine QBR.

Contexte : [RÉSUMÉ DE LA SITUATION]
Points sensibles connus : [LISTE]

Génère :
1. Les 10 questions les plus probables du client
2. Pour chaque question : une réponse structurée (acknowledge → explain → action)
3. Les pièges à éviter
4. Comment transformer une critique en opportunité
5. Phrases de transition pour garder le contrôle de la discussion`,tags:["QBR","objections","préparation"],difficulty:"intermediate",gordonBoost:!0},{id:"qbr-003",category:"qbr",title:"Script d'ouverture de QBR",description:"Démarrez votre QBR avec impact et crédibilité.",prompt:`Tu es un expert en communication exécutive. Rédige un script d'ouverture de QBR.

Compte : [NOM]
Participant le plus senior côté client : [NOM, TITRE]
Ton de la relation : [EXCELLENT / BON / TENDU / NOUVEAU]

Le script doit :
1. Durer 2-3 minutes max
2. Remercier et contextualiser
3. Rappeler les objectifs communs
4. Annoncer l'agenda avec les bénéfices pour le client
5. Créer de l'engagement dès le départ

Adapte le ton au niveau de la relation.`,tags:["QBR","script","ouverture"],difficulty:"starter",gordonBoost:!1},{id:"qbr-004",category:"qbr",title:"Quantifier la valeur délivrée",description:"Transformez vos actions en métriques d'impact pour impressionner en QBR.",prompt:`Tu es un expert en value selling. Aide-moi à quantifier la valeur que nous avons délivrée ce trimestre.

Compte : [NOM]
Actions réalisées : [LISTE DES ACTIONS/PROJETS DU TRIMESTRE]
Métriques disponibles : [LISTE]

Pour chaque action :
1. Identifie la métrique d'impact la plus pertinente
2. Quantifie en € ou en % d'amélioration
3. Formule la phrase d'impact ("Grâce à X, vous avez gagné Y")
4. Si pas de métrique dure : propose un proxy crédible
5. Résume en un "Total de valeur délivrée" ce trimestre`,tags:["valeur","métriques","ROI"],difficulty:"intermediate",gordonBoost:!1},{id:"qbr-005",category:"qbr",title:"Plan de redressement post-QBR difficile",description:"Votre QBR s'est mal passée ? Voici comment rebondir.",prompt:`Tu es un KAM senior qui a géré des situations de crise. Ma dernière QBR s'est mal passée.

Ce qui s'est passé : [RÉSUMÉ]
Réactions du client : [RÉSUMÉ]
Niveau de risque actuel : [1-10]

Crée un plan de redressement :
1. Actions dans les 48h (damage control)
2. Communication interne (escalade, support nécessaire)
3. Plan de reconquête sur 30 jours
4. Métriques de suivi pour mesurer le redressement
5. Script d'email de suivi post-QBR difficile`,tags:["crise","redressement","suivi"],difficulty:"advanced",gordonBoost:!0},{id:"qbr-006",category:"qbr",title:"Transformer la QBR en opportunité de vente",description:"Utilisez la QBR comme levier d'expansion commerciale.",prompt:`Tu es un expert en account expansion. Aide-moi à intégrer subtilement des opportunités de vente dans ma prochaine QBR.

Compte : [NOM]
Produits/services actuels : [LISTE]
Produits à proposer : [LISTE]

Conseille-moi :
1. À quel moment de la QBR introduire les opportunités
2. Comment les lier aux résultats du trimestre ("puisque X a fonctionné, Y pourrait...")
3. Le wording exact pour ne pas paraître "pushy"
4. Comment obtenir un next step concret (pas juste "on va y réfléchir")
5. Le piège à éviter absolument en QBR-vente`,tags:["expansion","vente","opportunité"],difficulty:"advanced",gordonBoost:!0},{id:"qbr-007",category:"qbr",title:"Template email post-QBR",description:"Envoyez un compte-rendu professionnel après votre QBR.",prompt:`Tu es un KAM organisé. Rédige un email de suivi post-QBR.

Compte : [NOM]
Date de la QBR : [DATE]
Participants : [LISTE]
Décisions prises : [LISTE]
Actions convenues : [LISTE AVEC RESPONSABLES]

L'email doit :
1. Remercier les participants
2. Résumer les points clés en bullet points
3. Lister les actions avec responsable + deadline
4. Confirmer la prochaine QBR
5. Finir sur une note positive et engageante

Ton : professionnel, concis, actionnable.`,tags:["email","suivi","compte-rendu"],difficulty:"starter",gordonBoost:!1},{id:"qbr-008",category:"qbr",title:"QBR pour un nouveau compte",description:"Structurez votre première QBR avec un nouveau client.",prompt:`Tu es un consultant KAM. C'est ma première QBR avec ce client. Il n'y a pas d'historique.

Compte : [NOM]
Durée de la relation : [MOIS]
Onboarding terminé : [OUI/NON]

Aide-moi à :
1. Structurer une QBR de "fondation" (vs une QBR de routine)
2. Les questions à poser pour établir la baseline
3. Comment définir les KPIs pour les prochains trimestres ensemble
4. Éviter l'erreur de "trop promettre" en première QBR
5. Comment terminer sur un engagement mutuel fort`,tags:["premier","onboarding","fondation"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-001",category:"capture-plan",title:"Capture Plan stratégique",description:"Créez un plan de rétention proactif pour sécuriser un renouvellement.",prompt:`Tu es un expert en rétention stratégique. Aide-moi à construire un Capture Plan.

Compte : [NOM]
CA annuel : [MONTANT]
Date de renouvellement : [DATE]
Durée avant renouvellement : [MOIS]

Crée un Capture Plan complet :
1. Stakeholder map (qui décide, qui influence)
2. Évaluation des risques (compétitifs, internes, budgétaires)
3. Proposition de valeur à renforcer
4. Timeline d'actions (J-180, J-120, J-90, J-60, J-30)
5. Stratégie de communication par stakeholder
6. Plan B si le renouvellement est menacé`,tags:["rétention","renouvellement","capture"],difficulty:"intermediate",gordonBoost:!0},{id:"cp-002",category:"capture-plan",title:"Défendre contre un concurrent entrant",description:"Votre client évalue un concurrent ? Préparez votre stratégie défensive.",prompt:`Tu es un stratège commercial aguerri. Mon client évalue un concurrent pour me remplacer.

Compte : [NOM]
Concurrent : [NOM]
Raison de l'évaluation : [PRIX / FONCTIONNALITÉS / POLITIQUE INTERNE / AUTRE]
Timeline de décision : [DATE]

Fournis :
1. Analyse des motivations réelles du client
2. Points forts/faibles du concurrent vs nous
3. Stratégie de défense (3 scénarios)
4. Argumentaire "coût du changement" (switching cost)
5. Actions immédiates (cette semaine)
6. Script pour la prochaine réunion avec le client`,tags:["défense","concurrent","rétention"],difficulty:"advanced",gordonBoost:!0},{id:"cp-003",category:"capture-plan",title:"Préparer l'argumentaire de renouvellement",description:"Construisez un business case solide pour justifier le renouvellement.",prompt:`Tu es un expert en value selling B2B. Aide-moi à préparer mon argumentaire de renouvellement.

Compte : [NOM]
Prix actuel : [MONTANT]
Valeur délivrée cette année : [RÉSUMÉ]
Demande du client : [REMISE / MÊME PRIX / HAUSSE ACCEPTÉE]

Génère :
1. Business case chiffré (ROI, TCO, valeur délivrée vs investissement)
2. 5 arguments clés, classés par impact
3. Réponse à l'objection prix
4. Comparaison "avec nous vs sans nous" (scénario de non-renouvellement)
5. Offre de renouvellement recommandée (structure)`,tags:["renouvellement","prix","business case"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-004",category:"capture-plan",title:"Gérer un changement de sponsor",description:"Votre sponsor interne quitte le client. Comment sécuriser la relation ?",prompt:`Tu es un KAM senior. Mon sponsor principal chez le client part (promotion, démission, réorg).

Compte : [NOM]
Sponsor sortant : [NOM, RÔLE]
Remplaçant potentiel : [NOM, RÔLE si connu]

Conseille-moi :
1. Actions immédiates (avant le départ)
2. Comment obtenir une introduction au remplaçant
3. Comment re-vendre la valeur à un nouveau décideur
4. Pièges à éviter dans la transition
5. Script d'email au sponsor sortant (demande de recommandation)
6. Script d'email au nouveau contact (introduction)`,tags:["sponsor","transition","relation"],difficulty:"advanced",gordonBoost:!0},{id:"cp-005",category:"capture-plan",title:"Négocier une hausse de prix",description:"Préparez et communiquez une augmentation tarifaire à un grand compte.",prompt:`Tu es un expert en négociation B2B. Je dois annoncer une hausse de prix à un compte stratégique.

Compte : [NOM]
Hausse prévue : [%]
Raison : [INFLATION / VALEUR AJOUTÉE / ALIGNEMENT MARCHÉ]
Relation actuelle : [BONNE / TENDUE / NEUTRE]

Génère :
1. Timing optimal pour l'annonce
2. Structure de l'argumentaire (justification + valeur)
3. Script de la conversation
4. Réponses aux 5 objections les plus probables
5. Concessions possibles (sans baisser le prix)
6. Plan B si le client refuse catégoriquement`,tags:["prix","négociation","hausse"],difficulty:"advanced",gordonBoost:!0},{id:"cp-006",category:"capture-plan",title:"Identifier les champions internes",description:"Repérez et activez vos alliés chez le client pour sécuriser le compte.",prompt:`Tu es un expert en vente complexe. Aide-moi à identifier et activer des champions internes chez mon client.

Compte : [NOM]
Contacts actuels : [LISTE AVEC RÔLES]
Historique de la relation : [RÉSUMÉ]

Fournis :
1. Critères pour identifier un vrai champion (vs un faux allié)
2. Questions à poser pour tester l'engagement de chaque contact
3. Comment transformer un utilisateur satisfait en champion actif
4. Plan de mobilisation des champions avant le renouvellement
5. Comment récompenser/valoriser vos champions sans franchir la ligne éthique`,tags:["champion","interne","mobilisation"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-007",category:"capture-plan",title:"Early warning system pour le churn",description:"Mettez en place un système de détection précoce des risques.",prompt:`Tu es un expert en Customer Success et KAM. Aide-moi à créer un système d'alerte précoce pour détecter les risques de churn.

Type de comptes : [SECTEUR / TAILLE]
Outils CRM utilisés : [LISTE]

Crée :
1. Liste des 15 signaux faibles de churn (comportementaux, relationnels, contractuels)
2. Scoring de risque : comment pondérer chaque signal
3. Seuils d'alerte (vert / orange / rouge)
4. Actions automatiques par niveau d'alerte
5. Dashboard de suivi recommandé (métriques clés)`,tags:["churn","alerte","prévention"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-008",category:"capture-plan",title:"Reconquérir un compte perdu",description:"Stratégie pour récupérer un client qui vous a quitté.",prompt:`Tu es un expert en win-back B2B. Un de mes comptes stratégiques nous a quittés il y a [DURÉE].

Compte : [NOM]
Raison du départ : [RÉSUMÉ]
Concurrent choisi : [NOM]
CA perdu : [MONTANT]

Crée une stratégie de reconquête :
1. Timing optimal pour reprendre contact
2. Angle d'approche (ce qui a changé chez nous)
3. Recherche d'intelligence : comment savoir si le concurrent déçoit
4. Script de reprise de contact (email + téléphone)
5. Offre de reconquête recommandée
6. Timeline sur 6 mois`,tags:["reconquête","win-back","stratégie"],difficulty:"advanced",gordonBoost:!0},{id:"obj-001",category:"objections",title:"Traiter l'objection prix en grand compte",description:"Répondez avec assurance quand un décideur challenge votre prix.",prompt:`Tu es un expert en négociation grands comptes. Mon client dit : "Vous êtes trop cher."

Contexte : [DESCRIPTION DE LA SITUATION]
Prix proposé : [MONTANT]
Concurrent moins cher : [OUI/NON, NOM si connu]

Fournis :
1. Les 3 techniques de réponse les plus efficaces en B2B
2. Comment reframer le débat prix → valeur
3. Questions à poser pour comprendre la vraie objection derrière le prix
4. Script de réponse (mot pour mot)
5. Ce qu'il ne faut JAMAIS dire face à cette objection`,tags:["prix","négociation","objection"],difficulty:"starter",gordonBoost:!0},{id:"obj-002",category:"objections",title:`"On va lancer un appel d'offres"`,description:"Votre client veut vous mettre en compétition. Comment réagir ?",prompt:`Tu es un stratège commercial B2B. Mon client annonce un appel d'offres pour le renouvellement.

Compte : [NOM]
Motivation probable : [POLITIQUE INTERNE / PRIX / RÉEL BESOIN DE CHANGEMENT]

Conseille-moi :
1. Comment réagir dans la réunion (attitude, mots)
2. Les 3 questions à poser immédiatement
3. Comment influencer le cahier des charges en votre faveur
4. Stratégie si l'AO est inévitable vs si on peut l'éviter
5. Comment mobiliser vos champions internes pendant l'AO`,tags:["appel offres","compétition","stratégie"],difficulty:"advanced",gordonBoost:!0},{id:"obj-003",category:"objections",title:'"Je dois en parler à mon manager"',description:"L'interlocuteur n'a pas le pouvoir de décision. Comment avancer ?",prompt:`Tu es un coach en vente complexe. Mon contact dit : "Je dois en parler à mon manager / au comité."

Contexte : [DESCRIPTION]
Ce que vous vendez : [RÉSUMÉ]

Fournis :
1. Comment évaluer si c'est une vraie objection ou un brush-off
2. Comment armer votre champion pour vendre en interne
3. Le document/email que votre contact peut forward à son manager
4. Comment proposer une réunion avec le décideur sans court-circuiter
5. Script de réponse immédiate`,tags:["décideur","champion","escalade"],difficulty:"intermediate",gordonBoost:!0},{id:"obj-004",category:"objections",title:'"On est satisfait de notre solution actuelle"',description:"Le client ne voit pas la raison de changer. Comment créer le doute ?",prompt:`Tu es un expert en consultative selling. Mon prospect dit : "On est satisfait de notre fournisseur actuel."

Leur fournisseur : [NOM si connu]

Fournis :
1. Pourquoi cette objection est en réalité une opportunité
2. Les 5 questions qui créent le doute sans être agressif
3. Comment introduire le concept de "coût de l'inaction"
4. Exemples de transitions qui ont fonctionné dans des cas similaires
5. La stratégie du "gardez votre solution, ajoutez la nôtre" (land and expand)`,tags:["statu quo","changement","prospection"],difficulty:"intermediate",gordonBoost:!1},{id:"obj-005",category:"objections",title:`"Le timing n'est pas bon"`,description:"Le client repousse la décision. Comment créer l'urgence ?",prompt:`Tu es un expert en closing B2B. Mon client dit : "Pas maintenant, revenez dans 6 mois."

Contexte : [DESCRIPTION]
Raison invoquée : [BUDGET / RÉORG / PRIORITÉS]

Fournis :
1. Comment distinguer un vrai problème de timing d'un non dit
2. Techniques pour créer l'urgence sans être pushy
3. Comment rester top-of-mind pendant l'attente
4. Le calendrier de suivi optimal (fréquence, canal, contenu)
5. Offre de "pré-engagement" pour sécuriser le deal future`,tags:["timing","urgence","suivi"],difficulty:"intermediate",gordonBoost:!0},{id:"obj-006",category:"objections",title:"Traiter les objections du Procurement",description:"Les Achats ont leurs propres tactiques. Préparez-vous.",prompt:`Tu es un expert en négociation avec les services Achats B2B. Je vais rencontrer le Procurement de mon client.

Compte : [NOM]
Montant du deal : [MONTANT]
Tactiques probables du Procurement : [REMISE DEMANDÉE / MISE EN CONCURRENCE / ALLONGEMENT PAIEMENT]

Prépare-moi :
1. Les 7 tactiques classiques des Achats et comment y répondre
2. Comment défendre le prix sans perdre la relation
3. Les concessions non-prix à proposer (scope, timeline, services)
4. Le moment où il faut escalader vers le business owner
5. Red flags qui indiquent que le deal est en danger`,tags:["achats","procurement","négociation"],difficulty:"advanced",gordonBoost:!0},{id:"obj-007",category:"objections",title:'"Votre concurrent offre plus de fonctionnalités"',description:"Le client compare feature par feature. Comment reframer ?",prompt:`Tu es un expert en positionnement compétitif. Mon client dit : "Votre concurrent [NOM] offre X, Y, Z que vous n'avez pas."

Fonctionnalités manquantes citées : [LISTE]

Fournis :
1. Comment reframer le débat features → résultats business
2. Argumentaire : "Pourquoi moins de features peut être un avantage"
3. Questions à poser pour comprendre le vrai besoin derrière la feature
4. Technique de la "future roadmap" (sans promettre)
5. Quand concéder et quand défendre sa position`,tags:["fonctionnalités","concurrence","positionnement"],difficulty:"intermediate",gordonBoost:!1},{id:"obj-008",category:"objections",title:`"On n'a pas le budget"`,description:"L'objection budget la plus classique. Comment la dépasser ?",prompt:`Tu es un expert en justification de budget B2B. Mon client dit : "On n'a pas le budget cette année."

Montant de notre solution : [MONTANT]
Budget du client pour ce type de solution : [CONNU/INCONNU]

Fournis :
1. 4 techniques pour "trouver" du budget chez le client
2. Comment construire un business case qui convainc le CFO
3. Les alternatives de structuration (étalement, paiement différé, phase 1 réduite)
4. Questions qui révèlent si le budget est un vrai obstacle ou un prétexte
5. Template d'email de justification de budget pour votre champion`,tags:["budget","ROI","justification"],difficulty:"starter",gordonBoost:!0},{id:"obj-009",category:"objections",title:'"On va développer ça en interne"',description:"Le client veut construire plutôt qu'acheter. Comment répondre ?",prompt:`Tu es un expert en vente de solutions vs build. Mon client dit : "On préfère développer ça en interne."

Ce que nous vendons : [DESCRIPTION]
Capacités internes du client : [RÉSUMÉ]

Fournis :
1. L'analyse Buy vs Build complète (coûts cachés du build)
2. Les 5 arguments les plus percutants pour le Buy
3. Comment quantifier le coût d'opportunité du développement interne
4. Cas d'étude type : "Ils ont essayé en interne et sont revenus vers nous"
5. Le compromis intelligent : "Construisez X, achetez Y" (stratégie de coexistence)`,tags:["build vs buy","interne","ROI"],difficulty:"intermediate",gordonBoost:!1},{id:"rm-001",category:"relationship-mapping",title:"Cartographier les décideurs",description:"Identifiez qui décide vraiment chez votre client.",prompt:`Tu es un expert en vente complexe B2B. Aide-moi à cartographier les décideurs de ce compte.

Compte : [NOM]
Type de décision : [ACHAT INITIAL / RENOUVELLEMENT / EXPANSION]
Budget estimé : [MONTANT]

Pour chaque rôle type (Sponsor Exécutif, Décideur Technique, Utilisateur Final, Acheteur, Influenceur), fournis :
1. Titre probable dans l'organigramme
2. Critères de décision spécifiques
3. Objections probables
4. Message clé adapté
5. Niveau d'engagement nécessaire (faible/moyen/fort)`,tags:["décideurs","cartographie","rôles"],difficulty:"starter",gordonBoost:!1},{id:"rm-002",category:"relationship-mapping",title:"Identifier les bloqueurs",description:"Repérez les résistances internes chez le client.",prompt:`Tu es un stratège de vente complexe. Aide-moi à identifier et gérer les bloqueurs potentiels.

Compte : [NOM]
Projet/deal en cours : [DESCRIPTION]
Bloqueurs suspectés : [NOMS/RÔLES si connus]

Fournis :
1. Les 5 profils types de bloqueurs en vente B2B
2. Signaux qui indiquent qu'un contact est un bloqueur
3. Stratégies pour chaque profil de bloqueur
4. Comment neutraliser un bloqueur sans conflit
5. Quand ignorer un bloqueur vs quand le confronter`,tags:["bloqueur","résistance","politique"],difficulty:"advanced",gordonBoost:!0},{id:"rm-003",category:"relationship-mapping",title:"Stratégie multi-thread",description:"Développez des contacts à plusieurs niveaux hiérarchiques.",prompt:`Tu es un expert en account management stratégique. Je n'ai qu'un seul contact chez ce client. C'est risqué.

Compte : [NOM]
Contact unique : [NOM, RÔLE]
Niveaux à couvrir : [OPÉRATIONNEL / MANAGEMENT / DIRECTION]

Crée un plan de multi-threading :
1. Pourquoi un seul contact est le plus grand risque en KAM
2. Stratégie pour obtenir des introductions sans court-circuiter
3. Événements/prétextes pour rencontrer d'autres niveaux
4. Template d'email pour demander une introduction
5. Objectif de couverture à 90 jours (nombre de contacts par niveau)`,tags:["multi-thread","contacts","risque"],difficulty:"intermediate",gordonBoost:!0},{id:"rm-004",category:"relationship-mapping",title:"Comprendre la politique interne",description:"Décryptez les dynamiques de pouvoir chez votre client.",prompt:`Tu es un conseiller en vente politique B2B. Aide-moi à comprendre la politique interne de ce compte.

Compte : [NOM]
Événements récents : [RÉORG / FUSION / NOUVEAU CEO / AUTRE]
Tensions observées : [ENTRE QUI ET QUI]

Analyse :
1. Comment ces changements impactent notre position
2. Les gagnants et perdants de la situation
3. Où nous positionner dans ce nouveau paysage
4. Les alliances à former et celles à éviter
5. Le piège politique n°1 à éviter en KAM`,tags:["politique","pouvoir","dynamiques"],difficulty:"advanced",gordonBoost:!1},{id:"rm-005",category:"relationship-mapping",title:"Construire une relation C-level",description:"Accédez et maintenez une relation avec les dirigeants.",prompt:`Tu es un expert en executive selling. Je veux construire une relation avec le C-level de mon client.

Compte : [NOM]
Cible C-level : [TITRE : CEO, CFO, CTO, COO...]
Relation actuelle : [AUCUNE / DISTANTE / CORRECTE]

Conseille-moi :
1. Les 3 canaux pour accéder au C-level (LinkedIn, événement, introduction)
2. Ce qui intéresse un C-level (vs un manager opérationnel)
3. Comment apporter de la valeur AVANT de demander quoi que ce soit
4. La fréquence de contact idéale avec un C-level
5. Le format de communication préféré des dirigeants
6. Les erreurs fatales qui vous font perdre l'accès C-level`,tags:["C-level","exécutif","relation"],difficulty:"advanced",gordonBoost:!0},{id:"rm-006",category:"relationship-mapping",title:"Préparer un événement client",description:"Planifiez un événement stratégique pour renforcer les relations.",prompt:`Tu es un expert en relation client B2B. Je veux organiser un événement pour mes contacts clés chez ce compte.

Compte : [NOM]
Nombre de contacts à inviter : [N]
Budget : [MONTANT]
Objectif : [RENFORCER / ÉTENDRE / CÉLÉBRER]

Propose :
1. 3 formats d'événements adaptés au contexte
2. Le programme idéal (timing, contenu, networking)
3. Comment sélectionner les bons invités
4. Les messages clés à passer pendant l'événement
5. Le suivi post-événement (dans les 48h)`,tags:["événement","networking","relation"],difficulty:"intermediate",gordonBoost:!1},{id:"rm-007",category:"relationship-mapping",title:"Plan de contacts trimestriel",description:"Structurez vos interactions avec tous les niveaux du compte.",prompt:`Tu es un KAM méthodique. Crée un plan de contacts trimestriel pour ce compte.

Compte : [NOM]
Contacts actuels : [LISTE AVEC NOM, RÔLE, NIVEAU]
Fréquence actuelle : [RÉSUMÉ]

Génère un plan :
1. Tableau : Contact / Fréquence / Format / Objectif
2. Événements clés du trimestre (QBR, anniversaire contrat, etc.)
3. Contenu à partager par niveau (C-level: insights marché, Ops: best practices, Tech: roadmap)
4. Métriques de suivi (NPS, sentiment, engagement)
5. Actions de "surprise and delight" (petites attentions à impact)`,tags:["plan","contacts","trimestre"],difficulty:"starter",gordonBoost:!1},{id:"rm-008",category:"relationship-mapping",title:"Gérer la relation en période de crise",description:"Maintenez la confiance quand les choses vont mal.",prompt:`Tu es un expert en gestion de crise B2B. Nous avons un incident majeur avec ce client.

Compte : [NOM]
Incident : [DESCRIPTION]
Impact client : [DESCRIPTION]
Réaction du client : [COLÈRE / DÉCEPTION / MENACE]

Conseille-moi :
1. Les 5 règles d'or de la communication de crise en KAM
2. Script d'appel d'urgence (dans l'heure)
3. Email de suivi (dans les 4h)
4. Plan de résolution avec timeline transparente
5. Comment transformer cette crise en renforcement de la relation`,tags:["crise","incident","confiance"],difficulty:"advanced",gordonBoost:!0},{id:"sc-001",category:"scoring",title:"Scoring de potentiel client",description:"Évaluez le potentiel stratégique de vos comptes.",prompt:`Tu es un analyste KAM. Aide-moi à scorer le potentiel de ce compte sur 6 dimensions.

Compte : [NOM]
Secteur : [SECTEUR]
CA actuel : [MONTANT]
Taille entreprise : [EFFECTIF]

Score chaque dimension de 1 à 5 et justifie :
1. Potentiel de revenu (taille du wallet)
2. Fit stratégique (alignement avec notre offre)
3. Force de la relation (accès, confiance)
4. Probabilité de croissance (tendance du compte)
5. Position concurrentielle (notre avantage)
6. Timeline de décision (urgence/prochaines étapes)

Score total /30 + recommandation (Invest / Maintain / Divest)`,tags:["scoring","potentiel","priorisation"],difficulty:"starter",gordonBoost:!1},{id:"sc-002",category:"scoring",title:"Segmenter son portefeuille",description:"Classez vos comptes en tiers stratégiques.",prompt:`Tu es un consultant en stratégie commerciale. Aide-moi à segmenter mon portefeuille de comptes.

Nombre de comptes : [N]
CA total : [MONTANT]
Répartition actuelle du temps : [RÉSUMÉ]

Fournis :
1. Critères de segmentation recommandés (Pareto, stratégique, potentiel)
2. Définition de chaque tier : Platinum / Gold / Silver / Bronze
3. Allocation de temps recommandée par tier
4. Actions types par tier (fréquence de contact, type de QBR, investissement)
5. Comment communiquer la segmentation en interne (à son manager)`,tags:["segmentation","portefeuille","tiers"],difficulty:"intermediate",gordonBoost:!1},{id:"sc-003",category:"scoring",title:"Analyse Pareto du portefeuille",description:"Appliquez la règle 80/20 à votre portefeuille.",prompt:`Tu es un analyste commercial. Aide-moi à appliquer le principe de Pareto à mon portefeuille.

Nombre total de comptes : [N]
Liste des comptes avec CA : [FORMAT : Nom — CA]

Analyse :
1. Identification des 20% qui font 80% du CA
2. Identification des comptes à fort potentiel sous-investis
3. Identification des comptes chronophages à faible CA
4. Recommandation de réallocation du temps
5. Actions concrètes : quels comptes intensifier, quels comptes déléguer`,tags:["Pareto","80/20","réallocation"],difficulty:"starter",gordonBoost:!1},{id:"sc-004",category:"scoring",title:"Scoring de risque par compte",description:"Identifiez les comptes les plus à risque dans votre portefeuille.",prompt:`Tu es un expert en risk management commercial. Aide-moi à scorer le risque de mes comptes.

Liste de comptes : [FORMAT : Nom — CA — Date renouvellement — Commentaire]

Pour chaque compte, évalue le risque (1-10) sur :
1. Risque contractuel (date renouvellement, clauses)
2. Risque relationnel (dépendance à un contact, turnover)
3. Risque concurrentiel (agressivité des concurrents)
4. Risque de satisfaction (incidents, NPS, feedback)
5. Risque économique (santé financière du client)

Classement final par risque global + top 3 actions de mitigation`,tags:["risque","scoring","mitigation"],difficulty:"intermediate",gordonBoost:!0},{id:"sc-005",category:"scoring",title:"Matrice d'attractivité vs position",description:"Positionnez vos comptes sur la matrice stratégique classique.",prompt:`Tu es un stratège commercial. Aide-moi à construire une matrice Attractivité du client vs Force de notre position.

Comptes à positionner : [LISTE AVEC CA ET COMMENTAIRE]

Pour chaque compte :
1. Score d'attractivité (1-10) : taille, croissance, marge, prestige
2. Score de position (1-10) : part de wallet, relation, avantage concurrentiel
3. Positionnement dans la matrice 2x2
4. Stratégie par quadrant :
   - Haute attractivité + Forte position → Investir
   - Haute attractivité + Faible position → Développer
   - Faible attractivité + Forte position → Défendre/Rentabiliser
   - Faible attractivité + Faible position → Désengager`,tags:["matrice","stratégie","attractivité"],difficulty:"intermediate",gordonBoost:!1},{id:"sc-006",category:"scoring",title:"Calculer le Customer Lifetime Value",description:"Estimez la valeur à vie de vos comptes stratégiques.",prompt:`Tu es un analyste financier commercial. Aide-moi à calculer le CLV de mes comptes clés.

Compte : [NOM]
CA annuel actuel : [MONTANT]
Marge brute : [%]
Durée moyenne de la relation dans le secteur : [ANNÉES]
Taux de croissance annuel estimé : [%]
Coût de service annuel : [MONTANT]

Calcule :
1. CLV simple (CA × marge × durée)
2. CLV avec croissance (intégrant le taux de croissance)
3. CLV net (après coût de service)
4. Comparaison avec le coût d'acquisition
5. Recommandation d'investissement basée sur le CLV`,tags:["CLV","valeur","financier"],difficulty:"advanced",gordonBoost:!1},{id:"sc-007",category:"scoring",title:"Prioriser les actions de la semaine",description:"Décidez où investir votre temps cette semaine.",prompt:`Tu es un coach de productivité KAM. Aide-moi à prioriser mes actions cette semaine.

Mes comptes et situations :
[FORMAT PAR COMPTE : Nom — CA — Situation actuelle — Action envisagée]

En utilisant la matrice Urgence/Impact, classe chaque action dans :
1. Faire immédiatement (urgent + fort impact)
2. Planifier (non urgent + fort impact)
3. Déléguer (urgent + faible impact)
4. Éliminer (non urgent + faible impact)

Propose un planning semaine (lundi à vendredi) avec les créneaux alloués.`,tags:["priorité","semaine","productivité"],difficulty:"starter",gordonBoost:!1},{id:"sc-008",category:"scoring",title:"Benchmark interne des comptes",description:"Comparez vos comptes entre eux pour identifier les best practices.",prompt:`Tu es un consultant en performance commerciale. Aide-moi à benchmarker mes comptes.

Comptes à comparer : [FORMAT : Nom — CA — Marge — Ancienneté — NPS]

Fournis :
1. Tableau comparatif sur 6 métriques
2. Identification du "compte modèle" (best-in-class)
3. Ce qui rend ce compte modèle différent
4. Actions pour répliquer ce succès sur les autres comptes
5. Les 3 quick wins les plus impactants`,tags:["benchmark","comparaison","best practice"],difficulty:"intermediate",gordonBoost:!1}],Hw=[{id:"aa-001",category:"account-analysis",title:"360° Account Analysis",description:"Get a comprehensive view of your strategic account in minutes.",prompt:`You are a KAM expert. Analyze this strategic account comprehensively.

Account: [ACCOUNT NAME]
Industry: [INDUSTRY]
Current revenue: [AMOUNT]
Relationship tenure: [DURATION]

Provide:
1. Strengths of the current relationship
2. Identified weaknesses
3. Growth opportunities
4. Threats (competition, budget, reorganization)
5. Account health score (1-10)
6. 3 priority actions for the next 30 days`,tags:["SWOT","analysis","strategy"],difficulty:"starter",gordonBoost:!0},{id:"aa-002",category:"account-analysis",title:"Identify Untapped Potential",description:"Discover hidden expansion opportunities within your existing accounts.",prompt:`You are a KAM expert specializing in account expansion.

Account: [NAME]
Products/services currently sold: [LIST]
Departments covered: [LIST]
Current revenue: [AMOUNT]

Analyze:
1. Which departments are not yet using our solutions?
2. What complementary products/services could be offered?
3. Are there subsidiaries or entities not yet addressed?
4. Estimate growth potential in % and value
5. Propose a 3-step penetration strategy`,tags:["expansion","upsell","cross-sell"],difficulty:"intermediate",gordonBoost:!0},{id:"aa-003",category:"account-analysis",title:"Competitive Analysis on the Account",description:"Assess your competitors' position at your client.",prompt:`You are a KAM strategist. Analyze the competitive position on this account.

Account: [NAME]
Identified competitors at the client: [LIST]
Our estimated market share: [%]

Provide:
1. Comparison matrix (us vs each competitor) on 5 criteria
2. Vulnerability points of each competitor
3. Our differentiating competitive advantage
4. Displacement risk (1-10)
5. Recommended defensive strategy
6. Offensive strategy to gain market share`,tags:["competition","defensive","offensive"],difficulty:"advanced",gordonBoost:!1},{id:"aa-004",category:"account-analysis",title:"Understand the Decision-Making Structure",description:"Decode your account's decision-making structure.",prompt:`You are a complex B2B sales expert. Help me understand the decision-making structure of this account.

Account: [NAME]
Industry: [INDUSTRY]
Size: [HEADCOUNT]
Purchase type: [NEW / RENEWAL / EXPANSION]

Describe:
1. Typical roles involved in this type of decision
2. Likely decision process (steps, timeline)
3. Decision criteria by role (technical, financial, strategic)
4. How to identify the real decision-maker vs the signatory
5. Questions to ask to map the decision circuit`,tags:["decision","org chart","complex sale"],difficulty:"intermediate",gordonBoost:!0},{id:"aa-005",category:"account-analysis",title:"Client Relationship Audit",description:"Assess the quality and depth of your relationship.",prompt:`You are a senior KAM consultant. Help me audit the quality of my relationship with this account.

Account: [NAME]
Contact frequency: [WEEKLY/MONTHLY/QUARTERLY]
Number of active contacts: [N]
Hierarchical levels covered: [OPERATIONAL/MANAGEMENT/EXECUTIVE]

Assess:
1. Relationship depth score (1-10) with justification
2. Identified gaps (uncovered levels, missing departments)
3. Single-contact dependency risk
4. Action plan to broaden and deepen the relationship
5. Recommended contact frequency by level`,tags:["relationship","audit","contacts"],difficulty:"starter",gordonBoost:!1},{id:"aa-006",category:"account-analysis",title:"Analyze the Client's Business Challenges",description:"Understand your client's strategic priorities to better position yourself.",prompt:`You are a B2B business analyst. Help me understand my client's strategic challenges.

Client: [NAME]
Industry: [INDUSTRY]
Latest known news: [SUMMARY]

Analyze:
1. The 3 likely strategic priorities of this client
2. External pressures (regulation, competition, market)
3. Likely internal challenges (transformation, cost reduction, growth)
4. How our solution aligns with these challenges
5. How to reframe our value proposition in the client's language`,tags:["strategy","business","value"],difficulty:"intermediate",gordonBoost:!0},{id:"aa-007",category:"account-analysis",title:"Churn Risk Analysis",description:"Identify warning signals before losing an account.",prompt:`You are an expert in strategic account retention. Help me assess the churn risk.

Account: [NAME]
Annual revenue: [AMOUNT]
Renewal date: [DATE]
Observed signals: [LIST: e.g., fewer meetings, benchmark requests, sponsor change...]

Provide:
1. Churn risk score (1-10) with justification
2. Signal classification (red / amber / green)
3. Likely root causes
4. Emergency retention plan (actions D+7, D+30, D+60)
5. Value argument to prepare for the next meeting`,tags:["churn","retention","risk"],difficulty:"advanced",gordonBoost:!0},{id:"aa-008",category:"account-analysis",title:"Prepare an Account Executive Summary",description:"Create an executive summary for your leadership or the client.",prompt:`You are a senior KAM presenting an account to leadership. Generate an executive summary.

Account: [NAME]
Revenue: [AMOUNT]
Products: [LIST]
History: [2-3 LINE SUMMARY]

Structure the summary as:
1. Overview (2 sentences max)
2. Key metrics (revenue, margin, satisfaction, tenure)
3. Key highlights from last quarter
4. Risks and opportunities
5. Strategic recommendation
6. Next steps

Tone: professional, concise, decision-oriented.`,tags:["executive","summary","leadership"],difficulty:"starter",gordonBoost:!1},{id:"aa-009",category:"account-analysis",title:"Map the Client's Value Chain",description:"Understand how your client creates value to better position yourself.",prompt:`You are a B2B strategy consultant. Help me map my client's value chain.

Client: [NAME]
Industry: [INDUSTRY]
Core business: [DESCRIPTION]

Describe:
1. Key steps in the client's value chain
2. Where we currently contribute
3. Where we could contribute (unaddressed areas)
4. The impact of our solution on their value chain
5. How to quantify this impact in business terms (ROI, TCO, productivity)`,tags:["value chain","positioning","ROI"],difficulty:"advanced",gordonBoost:!1},{id:"qbr-001",category:"qbr",title:"Complete QBR Structure",description:"Generate a professional QBR plan in minutes.",prompt:`You are an expert in strategic account reviews. Help me structure my next QBR.

Account: [NAME]
Client-side participants: [NAMES AND ROLES]
Main objective: [RETENTION / EXPANSION / TURNAROUND]

Generate a complete QBR plan:
1. Opening slide (agenda + objectives)
2. Quarter review (results vs targets)
3. Value delivered (impact metrics)
4. Incidents and resolutions
5. Strategic vision (next 90 days)
6. Identified opportunities
7. Joint action plan
8. Next steps

For each section, provide key content and discussion points.`,tags:["QBR","structure","quarterly"],difficulty:"starter",gordonBoost:!0},{id:"qbr-002",category:"qbr",title:"Prepare for Tough QBR Questions",description:"Anticipate the questions your client will ask and prepare your answers.",prompt:`You are an experienced KAM coach. My client will ask tough questions at my next QBR.

Context: [SITUATION SUMMARY]
Known pain points: [LIST]

Generate:
1. The 10 most likely client questions
2. For each question: a structured response (acknowledge → explain → action)
3. Traps to avoid
4. How to turn criticism into opportunity
5. Transition phrases to maintain control of the discussion`,tags:["QBR","objections","preparation"],difficulty:"intermediate",gordonBoost:!0},{id:"qbr-003",category:"qbr",title:"QBR Opening Script",description:"Start your QBR with impact and credibility.",prompt:`You are an executive communication expert. Write a QBR opening script.

Account: [NAME]
Most senior client participant: [NAME, TITLE]
Relationship tone: [EXCELLENT / GOOD / TENSE / NEW]

The script must:
1. Last 2-3 minutes max
2. Thank and contextualize
3. Recall shared objectives
4. Announce the agenda with client benefits
5. Create engagement from the start

Adapt the tone to the relationship level.`,tags:["QBR","script","opening"],difficulty:"starter",gordonBoost:!1},{id:"qbr-004",category:"qbr",title:"Quantify Value Delivered",description:"Turn your actions into impact metrics to impress during QBR.",prompt:`You are a value selling expert. Help me quantify the value we delivered this quarter.

Account: [NAME]
Actions completed: [LIST OF ACTIONS/PROJECTS THIS QUARTER]
Available metrics: [LIST]

For each action:
1. Identify the most relevant impact metric
2. Quantify in $ or % improvement
3. Frame the impact statement ("Thanks to X, you gained Y")
4. If no hard metric: suggest a credible proxy
5. Summarize as a "Total value delivered" this quarter`,tags:["value","metrics","ROI"],difficulty:"intermediate",gordonBoost:!1},{id:"qbr-005",category:"qbr",title:"Recovery Plan After a Tough QBR",description:"Your QBR went badly? Here is how to bounce back.",prompt:`You are a senior KAM who has handled crisis situations. My last QBR went badly.

What happened: [SUMMARY]
Client reactions: [SUMMARY]
Current risk level: [1-10]

Create a recovery plan:
1. Actions within 48 hours (damage control)
2. Internal communication (escalation, support needed)
3. 30-day reconquest plan
4. Tracking metrics to measure recovery
5. Follow-up email script after a difficult QBR`,tags:["crisis","recovery","follow-up"],difficulty:"advanced",gordonBoost:!0},{id:"qbr-006",category:"qbr",title:"Turn QBR into a Sales Opportunity",description:"Use QBR as a lever for commercial expansion.",prompt:`You are an account expansion expert. Help me subtly integrate sales opportunities into my next QBR.

Account: [NAME]
Current products/services: [LIST]
Products to propose: [LIST]

Advise me:
1. When during the QBR to introduce opportunities
2. How to link them to quarterly results ("since X worked, Y could...")
3. The exact wording to avoid seeming "pushy"
4. How to get a concrete next step (not just "we'll think about it")
5. The absolute trap to avoid in a QBR-sale`,tags:["expansion","sales","opportunity"],difficulty:"advanced",gordonBoost:!0},{id:"qbr-007",category:"qbr",title:"Post-QBR Email Template",description:"Send a professional follow-up after your QBR.",prompt:`You are an organized KAM. Write a post-QBR follow-up email.

Account: [NAME]
QBR date: [DATE]
Participants: [LIST]
Decisions made: [LIST]
Agreed actions: [LIST WITH OWNERS]

The email should:
1. Thank participants
2. Summarize key points in bullet points
3. List actions with owner + deadline
4. Confirm the next QBR
5. End on a positive and engaging note

Tone: professional, concise, actionable.`,tags:["email","follow-up","minutes"],difficulty:"starter",gordonBoost:!1},{id:"qbr-008",category:"qbr",title:"QBR for a New Account",description:"Structure your first QBR with a new client.",prompt:`You are a KAM consultant. This is my first QBR with this client. There is no history.

Account: [NAME]
Relationship duration: [MONTHS]
Onboarding completed: [YES/NO]

Help me:
1. Structure a "foundation" QBR (vs a routine QBR)
2. Questions to ask to establish the baseline
3. How to define KPIs for the next quarters together
4. Avoid the mistake of "over-promising" in the first QBR
5. How to close with a strong mutual commitment`,tags:["first","onboarding","foundation"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-001",category:"capture-plan",title:"Strategic Capture Plan",description:"Create a proactive retention plan to secure a renewal.",prompt:`You are a strategic retention expert. Help me build a Capture Plan.

Account: [NAME]
Annual revenue: [AMOUNT]
Renewal date: [DATE]
Time until renewal: [MONTHS]

Create a complete Capture Plan:
1. Stakeholder map (who decides, who influences)
2. Risk assessment (competitive, internal, budget)
3. Value proposition to reinforce
4. Action timeline (D-180, D-120, D-90, D-60, D-30)
5. Communication strategy per stakeholder
6. Plan B if renewal is threatened`,tags:["retention","renewal","capture"],difficulty:"intermediate",gordonBoost:!0},{id:"cp-002",category:"capture-plan",title:"Defend Against an Incoming Competitor",description:"Your client is evaluating a competitor? Prepare your defensive strategy.",prompt:`You are a seasoned sales strategist. My client is evaluating a competitor to replace me.

Account: [NAME]
Competitor: [NAME]
Reason for evaluation: [PRICE / FEATURES / INTERNAL POLITICS / OTHER]
Decision timeline: [DATE]

Provide:
1. Analysis of the client's real motivations
2. Competitor strengths/weaknesses vs ours
3. Defense strategy (3 scenarios)
4. "Switching cost" argument
5. Immediate actions (this week)
6. Script for the next client meeting`,tags:["defense","competitor","retention"],difficulty:"advanced",gordonBoost:!0},{id:"cp-003",category:"capture-plan",title:"Prepare the Renewal Pitch",description:"Build a solid business case to justify renewal.",prompt:`You are a B2B value selling expert. Help me prepare my renewal pitch.

Account: [NAME]
Current price: [AMOUNT]
Value delivered this year: [SUMMARY]
Client request: [DISCOUNT / SAME PRICE / INCREASE ACCEPTED]

Generate:
1. Quantified business case (ROI, TCO, value delivered vs investment)
2. 5 key arguments, ranked by impact
3. Response to the price objection
4. "With us vs without us" comparison (non-renewal scenario)
5. Recommended renewal offer (structure)`,tags:["renewal","pricing","business case"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-004",category:"capture-plan",title:"Handle a Sponsor Change",description:"Your internal sponsor is leaving the client. How to secure the relationship?",prompt:`You are a senior KAM. My main sponsor at the client is leaving (promotion, resignation, reorg).

Account: [NAME]
Outgoing sponsor: [NAME, ROLE]
Potential replacement: [NAME, ROLE if known]

Advise me:
1. Immediate actions (before departure)
2. How to get an introduction to the replacement
3. How to re-sell the value to a new decision-maker
4. Pitfalls to avoid during transition
5. Email script to the outgoing sponsor (requesting referral)
6. Email script to the new contact (introduction)`,tags:["sponsor","transition","relationship"],difficulty:"advanced",gordonBoost:!0},{id:"cp-005",category:"capture-plan",title:"Negotiate a Price Increase",description:"Prepare and communicate a price increase to a strategic account.",prompt:`You are a B2B negotiation expert. I need to announce a price increase to a strategic account.

Account: [NAME]
Planned increase: [%]
Reason: [INFLATION / ADDED VALUE / MARKET ALIGNMENT]
Current relationship: [GOOD / TENSE / NEUTRAL]

Generate:
1. Optimal timing for the announcement
2. Argument structure (justification + value)
3. Conversation script
4. Responses to the 5 most likely objections
5. Possible concessions (without lowering the price)
6. Plan B if the client categorically refuses`,tags:["pricing","negotiation","increase"],difficulty:"advanced",gordonBoost:!0},{id:"cp-006",category:"capture-plan",title:"Identify Internal Champions",description:"Spot and activate your allies at the client to secure the account.",prompt:`You are a complex sales expert. Help me identify and activate internal champions at my client.

Account: [NAME]
Current contacts: [LIST WITH ROLES]
Relationship history: [SUMMARY]

Provide:
1. Criteria to identify a true champion (vs a false ally)
2. Questions to ask to test each contact's engagement
3. How to turn a satisfied user into an active champion
4. Champion mobilization plan before renewal
5. How to reward/recognize your champions without crossing ethical lines`,tags:["champion","internal","mobilization"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-007",category:"capture-plan",title:"Early Warning System for Churn",description:"Set up an early detection system for churn risks.",prompt:`You are a Customer Success and KAM expert. Help me create an early warning system to detect churn risks.

Account type: [INDUSTRY / SIZE]
CRM tools used: [LIST]

Create:
1. List of 15 weak churn signals (behavioral, relational, contractual)
2. Risk scoring: how to weight each signal
3. Alert thresholds (green / amber / red)
4. Automated actions per alert level
5. Recommended tracking dashboard (key metrics)`,tags:["churn","alert","prevention"],difficulty:"intermediate",gordonBoost:!1},{id:"cp-008",category:"capture-plan",title:"Win Back a Lost Account",description:"Strategy to recover a client who left you.",prompt:`You are a B2B win-back expert. One of my strategic accounts left us [DURATION] ago.

Account: [NAME]
Reason for departure: [SUMMARY]
Chosen competitor: [NAME]
Lost revenue: [AMOUNT]

Create a win-back strategy:
1. Optimal timing to re-engage
2. Approach angle (what has changed on our side)
3. Intelligence gathering: how to find out if the competitor is disappointing
4. Re-engagement script (email + phone)
5. Recommended win-back offer
6. 6-month timeline`,tags:["win-back","recovery","strategy"],difficulty:"advanced",gordonBoost:!0},{id:"obj-001",category:"objections",title:"Handle the Price Objection in Enterprise",description:"Respond with confidence when a decision-maker challenges your price.",prompt:`You are an enterprise negotiation expert. My client says: "You're too expensive."

Context: [SITUATION DESCRIPTION]
Proposed price: [AMOUNT]
Cheaper competitor: [YES/NO, NAME if known]

Provide:
1. The 3 most effective response techniques in B2B
2. How to reframe the debate from price → value
3. Questions to ask to understand the real objection behind the price
4. Response script (word for word)
5. What you should NEVER say when facing this objection`,tags:["price","negotiation","objection"],difficulty:"starter",gordonBoost:!0},{id:"obj-002",category:"objections",title:`"We're Going to Run an RFP"`,description:"Your client wants to put you in competition. How to react?",prompt:`You are a B2B sales strategist. My client announces an RFP for the renewal.

Account: [NAME]
Likely motivation: [INTERNAL POLITICS / PRICE / GENUINE NEED FOR CHANGE]

Advise me:
1. How to react in the meeting (attitude, words)
2. The 3 questions to ask immediately
3. How to influence the RFP requirements in your favor
4. Strategy if the RFP is unavoidable vs if it can be avoided
5. How to mobilize your internal champions during the RFP`,tags:["RFP","competition","strategy"],difficulty:"advanced",gordonBoost:!0},{id:"obj-003",category:"objections",title:'"I Need to Check with My Manager"',description:"The contact doesn't have decision-making authority. How to move forward?",prompt:`You are a complex sales coach. My contact says: "I need to run this by my manager / the committee."

Context: [DESCRIPTION]
What you're selling: [SUMMARY]

Provide:
1. How to assess if it's a real objection or a brush-off
2. How to arm your champion to sell internally
3. The document/email your contact can forward to their manager
4. How to propose a meeting with the decision-maker without going over heads
5. Immediate response script`,tags:["decision-maker","champion","escalation"],difficulty:"intermediate",gordonBoost:!0},{id:"obj-004",category:"objections",title:`"We're Happy with Our Current Solution"`,description:"The client sees no reason to change. How to create doubt?",prompt:`You are a consultative selling expert. My prospect says: "We're happy with our current provider."

Their provider: [NAME if known]

Provide:
1. Why this objection is actually an opportunity
2. The 5 questions that create doubt without being aggressive
3. How to introduce the concept of "cost of inaction"
4. Examples of transitions that worked in similar cases
5. The "keep your solution, add ours" strategy (land and expand)`,tags:["status quo","change","prospecting"],difficulty:"intermediate",gordonBoost:!1},{id:"obj-005",category:"objections",title:`"The Timing Isn't Right"`,description:"The client is postponing the decision. How to create urgency?",prompt:`You are a B2B closing expert. My client says: "Not now, come back in 6 months."

Context: [DESCRIPTION]
Stated reason: [BUDGET / REORG / PRIORITIES]

Provide:
1. How to distinguish a real timing issue from an unspoken objection
2. Techniques to create urgency without being pushy
3. How to stay top-of-mind during the wait
4. Optimal follow-up schedule (frequency, channel, content)
5. "Pre-commitment" offer to secure the future deal`,tags:["timing","urgency","follow-up"],difficulty:"intermediate",gordonBoost:!0},{id:"obj-006",category:"objections",title:"Handle Procurement Objections",description:"Procurement has their own tactics. Be prepared.",prompt:`You are a B2B procurement negotiation expert. I'm about to meet my client's Procurement team.

Account: [NAME]
Deal amount: [AMOUNT]
Likely procurement tactics: [DISCOUNT REQUEST / COMPETITIVE BID / EXTENDED PAYMENT TERMS]

Prepare me:
1. The 7 classic procurement tactics and how to respond
2. How to defend the price without damaging the relationship
3. Non-price concessions to offer (scope, timeline, services)
4. When to escalate to the business owner
5. Red flags indicating the deal is at risk`,tags:["procurement","negotiation","tactics"],difficulty:"advanced",gordonBoost:!0},{id:"obj-007",category:"objections",title:'"Your Competitor Offers More Features"',description:"The client is comparing feature by feature. How to reframe?",prompt:`You are a competitive positioning expert. My client says: "Your competitor [NAME] offers X, Y, Z that you don't have."

Missing features cited: [LIST]

Provide:
1. How to reframe the debate from features → business outcomes
2. Argument: "Why fewer features can be an advantage"
3. Questions to ask to understand the real need behind the feature
4. The "future roadmap" technique (without over-promising)
5. When to concede and when to hold your position`,tags:["features","competition","positioning"],difficulty:"intermediate",gordonBoost:!1},{id:"obj-008",category:"objections",title:`"We Don't Have the Budget"`,description:"The most classic budget objection. How to overcome it?",prompt:`You are a B2B budget justification expert. My client says: "We don't have the budget this year."

Client budget for this type of solution: [KNOWN/UNKNOWN]

Provide:
1. 4 techniques to "find" budget at the client
2. How to build a business case that convinces the CFO
3. Structuring alternatives (installments, deferred payment, reduced phase 1)
4. Questions that reveal whether budget is a real obstacle or a pretext
5. Budget justification email template for your champion`,tags:["budget","ROI","justification"],difficulty:"starter",gordonBoost:!0},{id:"obj-009",category:"objections",title:`"We'll Build It In-House"`,description:"The client wants to build rather than buy. How to respond?",prompt:`You are a solutions vs build sales expert. My client says: "We prefer to develop this in-house."

Client's internal capabilities: [SUMMARY]

Provide:
1. Complete Buy vs Build analysis (hidden costs of building)
2. The 5 most compelling arguments for Buy
3. How to quantify the opportunity cost of in-house development
4. Typical case study: "They tried in-house and came back to us"

For each typical role (Executive Sponsor, Technical Decision-Maker, End User, Buyer, Influencer), provide:
1. Likely title in the org chart
2. Specific decision criteria
3. Likely objections
4. Tailored key message
5. Required engagement level (low/medium/high)`,tags:["decision-makers","mapping","roles"],difficulty:"starter",gordonBoost:!1},{id:"rm-002",category:"relationship-mapping",title:"Identify Blockers",description:"Spot internal resistance at the client.",prompt:`You are a complex sales strategist. Help me identify and manage potential blockers.

Ongoing project/deal: [DESCRIPTION]
Suspected blockers: [NAMES/ROLES if known]

Provide:
1. The 5 typical blocker profiles in B2B sales
2. Signals indicating a contact is a blocker
3. Strategies for each blocker profile
4. How to neutralize a blocker without conflict
5. When to ignore a blocker vs when to confront them`,tags:["blocker","resistance","politics"],difficulty:"advanced",gordonBoost:!0},{id:"rm-003",category:"relationship-mapping",title:"Multi-Threading Strategy",description:"Develop contacts across multiple hierarchical levels.",prompt:`You are a strategic account management expert. I only have one contact at this client. This is risky.

Account: [NAME]
Sole contact: [NAME, ROLE]

1. Why a single contact is the biggest risk in KAM
2. Strategy to get introductions without going over heads
3. Events/pretexts to meet other levels
4. Email template to request an introduction
5. 90-day coverage target (number of contacts per level)`,tags:["multi-thread","contacts","risk"],difficulty:"intermediate",gordonBoost:!0},{id:"rm-004",category:"relationship-mapping",title:"Understand Internal Politics",description:"Decode the power dynamics at your client.",prompt:`You are a B2B political selling advisor. Help me understand the internal politics of this account.

1. How these changes impact our position
2. The winners and losers of the situation
3. Where to position ourselves in this new landscape
4. Alliances to form and those to avoid

Current relationship: [NONE / DISTANT / DECENT]

Advise me:
1. The 3 channels to reach the C-level (LinkedIn, event, introduction)
2. What a C-level cares about (vs an operational manager)
3. How to deliver value BEFORE asking for anything

5. Executives' preferred communication format

5. "Surprise and delight" actions (small gestures with big impact)`,tags:["plan","contacts","quarterly"],difficulty:"starter",gordonBoost:!1},{id:"rm-008",category:"relationship-mapping",title:"Manage Relationships During a Crisis",description:"Maintain trust when things go wrong.",prompt:`You are a B2B crisis management expert. We have a major incident with this client.

Incident: [DESCRIPTION]
Client impact: [DESCRIPTION]
Client reaction: [ANGER / DISAPPOINTMENT / THREAT]

Total revenue: [AMOUNT]
Current time allocation: [SUMMARY]

4. Time reallocation recommendation

3. Competitive risk (competitor aggressiveness)

5. Economic risk (client's financial health)

3. Placement in the 2x2 matrix
4. Strategy per quadrant:
   - High attractiveness + Strong position → Invest
   - High attractiveness + Weak position → Develop
   - Low attractiveness + Strong position → Defend/Monetize
   - Low attractiveness + Weak position → Disengage`,tags:["matrix","strategy","attractiveness"],difficulty:"intermediate",gordonBoost:!1},{id:"sc-006",category:"scoring",title:"Calculate Customer Lifetime Value",description:"Estimate the lifetime value of your strategic accounts.",prompt:`You are a commercial finance analyst. Help me calculate the CLV of my key accounts.

Average relationship duration in this industry: [YEARS]
Estimated annual growth rate: [%]
Annual cost to serve: [AMOUNT]

2. CLV with growth (incorporating growth rate)
3. Net CLV (after cost to serve)

2. Schedule (not urgent + high impact)
